jenkins:
  systemMessage: "Managed by JCasC — do not edit via UI, changes will be overwritten"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${jenkins/admin-password}"

  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"
        - "Overall/Read:authenticated"

  clouds:
    - kubernetes:
        name: "eks-build-my-app"
        serverUrl: "${EKS_CLUSTER_ENDPOINT}"
        namespace: "jenkins"
        credentialsId: "jenkins/k8s-token"
        serverCertificate: "${EKS_CA_CERT}"
        jenkinsUrl: "${JENKINS_URL}"
        containerCapStr: "10"
        templates:
          - name: "build-agent"
            label: "build-agent"
            agentContainer: "jnlp"
            agentInjection: false
            webSocket: true
            namespace: "jenkins"
            nodeSelector: "role=build-node"
            serviceAccount: "jenkins-controller"
            yaml: |
              apiVersion: v1
              kind: Pod
              metadata:
                name: jenkins-agent
                namespace: jenkins
              spec:
                serviceAccountName: jenkins-controller
                tolerations:
                - key: "dedicated"
                  operator: "Equal"
                  value: "build"
                  effect: "NoSchedule"
                containers:
                - name: jnlp
                  image: jenkins/inbound-agent:latest-jdk21
                - name: git
                  image: alpine/git
                  command: ["cat"]
                  tty: true
                - name: gitleaks
                  image: zricethezav/gitleaks:latest
                  command: ["cat"]
                  tty: true
                - name: sonar
                  image: sonarsource/sonar-scanner-cli:latest
                  command: ["cat"]
                  tty: true
                - name: kaniko
                  image: gcr.io/kaniko-project/executor:debug
                  command: ["/busybox/cat"]
                  tty: true
                - name: trivy
                  image: aquasec/trivy:latest
                  command: ["cat"]
                  tty: true
                - name: helm
                  image: alpine/helm:3.14.0
                  command: ["cat"]
                  tty: true

unclassified:
  jenkinsLocationConfiguration:
    url: "http://${JENKINS_URL}:8080"

  sonarGlobalConfiguration:
    installations:
      - name: "sonarqube-server"
        serverUrl: "http://sonarqube.sonarqube.svc.cluster.local:9000"
        credentialsId: "jenkins/sonar/token"